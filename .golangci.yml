linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - misspell
  disable:
    - lll  # long lines — not useful for this project

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  go: "1.24"

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
