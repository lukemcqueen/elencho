linters:
  disable-all: true
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - misspell

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  go: "1.24"

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
