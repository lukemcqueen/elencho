# Elencho embedded rule definitions
# This is the canonical source of truth for all detection rules.
# Updated rules can be downloaded as signed manifests and overlaid at runtime.
version: 1

rules:
  # ── Generic / Cross-cutting ──────────────────────────────────────
  - id: generic-zero-width-unicode
    severity: MEDIUM
    category: obfuscation
    description: Zero-width Unicode characters in source code — possible obfuscation
    detector: zero_width_bytes
    file_extensions:
      - ".js"
      - ".ts"
      - ".py"
      - ".rb"
      - ".go"
      - ".rs"
      - ".sh"
      - ".bash"
      - ".php"
      - ".java"
      - ".swift"
    message: "Zero-width Unicode character detected — possible obfuscation"
    remediation: "Remove zero-width characters or review the affected lines"

  - id: generic-long-base64
    severity: LOW
    category: obfuscation
    description: Unusually long base64 strings — verify it's not encoded payload
    detector: long_base64
    file_extensions:
      - ".js"
      - ".ts"
      - ".py"
      - ".sh"
      - ".rb"
    message: "Unusually long base64 string — verify it's not encoded payload"
    remediation: "Verify the base64 string is a legitimate data URI, not an encoded payload"

  - id: generic-obfuscated-eval
    severity: MEDIUM
    category: obfuscation
    description: Obfuscated eval/exec — likely hidden code execution
    detector: obfuscated_eval
    file_extensions:
      - ".js"
      - ".ts"
    message: "Obfuscated eval/exec — likely hidden code execution"
    remediation: "Replace obfuscated eval with direct function calls"

  - id: generic-minified-require
    severity: MEDIUM
    category: obfuscation
    description: Minified file with local requires — verify it's legitimate
    detector: minified_require
    file_extensions:
      - ".js"
    message: "Minified file with local requires — verify it's legitimate"
    remediation: "Review the minified file — use a known package or remove it"

  - id: generic-hex-encoded
    severity: MEDIUM
    category: obfuscation
    description: Unusually long hex-encoded strings — possible encoded payload
    detector: hex_encoded
    file_extensions:
      - ".js"
      - ".ts"
      - ".py"
      - ".sh"
      - ".rb"
      - ".php"
      - ".pl"
    message: "Unusually long hex-encoded string — possible encoded payload"
    remediation: "Verify the hex string is legitimate; decode and inspect if suspicious"

  - id: generic-hardcoded-secret
    severity: HIGH
    category: secret-leak
    description: Possible hardcoded credential — verify this isn't a real key
    detector: hardcoded_secret
    file_extensions:
      - ".js"
      - ".ts"
      - ".py"
      - ".rb"
      - ".go"
      - ".yml"
      - ".yaml"
      - ".json"
    message: "Possible hardcoded credential"
    remediation: "Move secrets to environment variables or a vault"
    fix_command: "gitleaks detect ."

  - id: generic-trojan-source
    severity: CRITICAL
    category: obfuscation
    description: Bidirectional Unicode override characters — trojan-source attack (CVE-2021-42574)
    detector: trojan_source
    message: "Bidirectional Unicode override — trojan-source attack possible"
    remediation: "Remove bidirectional Unicode override characters — potential trojan-source attack"
    fix_command: "sed -i 's/\xE2\x80\xAE//g' affected_file"

  - id: generic-gitattributes-filter
    severity: HIGH
    category: git-attributes
    description: Git filter/smudge defined — can auto-transform files on checkout
    detector: gitattributes_filter
    file_names:
      - ".gitattributes"
    message: "Git filter/smudge defined — can auto-transform files on checkout"
    remediation: "Review gitattributes filter — can auto-execute code on checkout"

  - id: generic-hidden-executable
    severity: MEDIUM
    category: suspicious-file
    description: Executable file in hidden directory
    detector: hidden_executable
    message: "Executable file in hidden directory"
    remediation: "Remove the executable or move it to a visible, documented location"
    fix_command: "git rm --cached hidden_file"

  # ── Shell ────────────────────────────────────────────────────────
  - id: shell-curl-pipe-bash
    severity: CRITICAL
    category: remote-execution
    description: Downloads and pipes to shell
    detector: curl_pipe_bash
    file_extensions:
      - ".sh"
      - ".bash"
      - ".zsh"
    file_names:
      - "Makefile"
      - "Dockerfile"
    message: "Downloads and pipes to shell"
    remediation: "Replace with version-pinned package download and checksum verification"
    fix_command: "curl -fsSL https://example.com/pkg.tar.gz | sha256sum -c pkg.sha256 && tar xzf pkg.tar.gz"

  - id: shell-base64-exec
    severity: CRITICAL
    category: remote-execution
    description: Base64-decoded staged payload piped to shell
    detector: base64_exec
    file_extensions:
      - ".sh"
      - ".bash"
      - ".zsh"
    file_names:
      - "Makefile"
      - "Dockerfile"
    message: "Base64 decode piped to shell — likely staged payload"
    remediation: "Remove base64-decoded shell execution — verify the payload source"

  - id: shell-history-evasion
    severity: MEDIUM
    category: suspicious
    description: Commands that clear or disable shell history — common post-exploitation
    detector: history_evasion
    file_extensions:
      - ".sh"
      - ".bash"
      - ".zsh"
    file_names:
      - "Makefile"
      - "Dockerfile"
    message: "Shell history evasion — possible post-exploitation activity"
    remediation: "Remove history-clearing commands — likely post-exploitation activity"

  - id: shell-reverse-shell
    severity: CRITICAL
    category: remote-execution
    description: Possible reverse shell
    detector: reverse_shell
    file_extensions:
      - ".sh"
      - ".bash"
      - ".zsh"
    file_names:
      - "Makefile"
      - "Dockerfile"
    message: "Possible reverse shell"
    remediation: "Remove the reverse shell — this is a remote access backdoor"

  # ── npm ──────────────────────────────────────────────────────────
  - id: npm-postinstall-download
    severity: HIGH
    category: script-execution
    description: Dangerous postinstall script downloads or contacts remote
    detector: npm_postinstall_download
    file_names:
      - "package.json"
    message: "Dangerous postinstall script downloads or contacts remote"
    remediation: "Remove network calls from postinstall scripts or pin the package version"
    fix_command: "npm audit && npm ls 2>/dev/null"

  - id: npm-postinstall-eval
    severity: HIGH
    category: script-execution
    description: Postinstall runs inline code via node -e or require
    detector: npm_postinstall_eval
    file_names:
      - "package.json"
    message: "Postinstall runs inline code via node -e or require"
    remediation: "Remove inline code execution from postinstall scripts"
    fix_command: "npm audit && npm ls 2>/dev/null"

  - id: npm-suspicious-script
    severity: CRITICAL
    category: script-execution
    description: Suspicious command in scripts
    detector: npm_suspicious_script
    file_names:
      - "package.json"
    message: "Suspicious command in scripts"
    remediation: "Review the suspicious script — ensure it's not a backdoor"

  - id: npmrc-hook
    severity: MEDIUM
    category: script-execution
    description: .npmrc contains script hook
    detector: npmrc_hook
    file_names:
      - ".npmrc"
    message: ".npmrc contains script hook"
    remediation: "Remove script hooks from .npmrc if not intentional"

  - id: npm-git-dependency
    severity: MEDIUM
    category: dependency
    description: Unpinned git dependency
    detector: npm_git_dependency
    file_names:
      - "package.json"
    message: "Unpinned git dependency"
    remediation: "Pin the git dependency to a specific commit hash"
    fix_command: "npm install package@github:user/repo#commit"

  - id: npm-unpinned-dep
    severity: LOW
    category: dependency
    description: Dependency uses '*' or 'latest' as version — supply chain risk
    detector: npm_unpinned_dep
    file_names:
      - "package.json"
    message: "Unpinned dependency version (* or latest)"
    remediation: "Pin to a specific semver version instead of * or latest"
    fix_command: "npm install package@^1.2.3 --save"

  # ── Python ───────────────────────────────────────────────────────
  - id: python-cmdclass
    severity: HIGH
    category: script-execution
    description: setup.py defines cmdclass — can execute arbitrary build code
    detector: python_cmdclass
    file_names:
      - "setup.py"
    message: "setup.py defines cmdclass — can execute arbitrary build code"
    remediation: "Review cmdclass — can execute arbitrary code during build"

  - id: python-setup-download
    severity: HIGH
    category: script-execution
    description: setup.py calls network or shell command
    detector: python_setup_download
    file_names:
      - "setup.py"
    message: "setup.py calls network or shell command"
    remediation: "Remove network/shell calls from setup.py"

  - id: python-build-backend
    severity: MEDIUM
    category: script-execution
    description: Unusual build backend
    detector: python_build_backend
    file_names:
      - "setup.cfg"
      - "pyproject.toml"
    message: "Unusual build backend"
    remediation: "Use a well-known build backend (setuptools, hatchling, flit, pdm)"

  - id: python-custom-index
    severity: MEDIUM
    category: dependency
    description: Custom pip index (potential dependency confusion)
    detector: python_custom_index
    file_names:
      - "pip.conf"
      - "pip.ini"
    message: "Custom pip index (potential dependency confusion)"
    remediation: "Review custom pip index — verify it's not a dependency confusion attack"
    fix_command: "pip install --index-url https://pypi.org/simple package"

  - id: python-git-dependency
    severity: MEDIUM
    category: dependency
    description: Unpinned dependency from external source
    detector: python_git_dependency
    message: "Unpinned dependency from external source"
    remediation: "Pin to a specific version on PyPI instead of git"
    fix_command: "pip install package==1.2.3"

  - id: python-dynamic-import
    severity: MEDIUM
    category: script-execution
    description: Dynamic module import via __import__ or importlib — common malware loader pattern
    detector: python_dynamic_import
    file_extensions:
      - ".py"
    message: "Dynamic module import — common malware loader pattern"
    remediation: "Replace dynamic __import__() with static imports where possible"

  - id: dockerfile-dangerous
    severity: MEDIUM
    category: container-supply-chain
    description: Dangerous patterns in Dockerfiles — piping unverified downloads to shell, ADD from URLs, root user
    detector: dockerfile_dangerous
    file_names:
      - "Dockerfile"
    message: "Dangerous pattern in Dockerfile — reviewing the line"
    remediation: "Verify the download source, use checksum verification, and avoid running as root"
    fix_command: "RUN curl -fsSL https://example.com/pkg.tar.gz | sha256sum -c pkg.sha256 && tar xzf"

  - id: actions-dangerous
    severity: MEDIUM
    category: ci-cd-security
    description: Dangerous patterns in GitHub Actions workflows — remote code execution, token leaks
    detector: actions_dangerous
    message: "Dangerous pattern in GitHub Actions workflow"
    remediation: "Avoid curl|bash in workflows; use pinned action versions"
    fix_command: "uses: actions/checkout@v4"

  - id: known-malicious-npm
    severity: CRITICAL
    category: supply-chain
    description: Dependency matches known malicious npm package
    detector: known_malicious_npm
    message: "Known malicious npm package detected"
    remediation: "Remove the dependency immediately and audit your lockfile"
    fix_command: "npm uninstall <package> && npm audit"

  - id: known-malicious-pypi
    severity: CRITICAL
    category: supply-chain
    description: Dependency matches known malicious PyPI package
    detector: known_malicious_pypi
    message: "Known malicious PyPI package detected"
    remediation: "Remove the dependency immediately and audit your requirements"
    fix_command: "pip uninstall <package> -y && pip freeze > requirements.txt"

  - id: known-malicious-go
    severity: CRITICAL
    category: supply-chain
    description: Dependency matches known malicious Go module
    detector: known_malicious_go
    message: "Known malicious Go module detected"
    remediation: "Remove the dependency immediately and verify your go.sum"
    fix_command: "go mod tidy && go mod verify"

  # ── Git ──────────────────────────────────────────────────────────
  - id: git-binary-in-source
    severity: MEDIUM
    category: binary-artifact
    description: Binary file in source tree — verify intent
    detector: git_binary_in_source
    message: "Binary file in source tree — verify intent"
    remediation: "Remove binary files from source directories; add to .gitignore"
    fix_command: "git rm --cached file.bin && echo '*.bin' >> .gitignore"

  - id: git-env-in-history
    severity: HIGH
    category: secret-leak
    description: Files matching .env* have been committed in git history
    detector: git_env_in_history
    message: "Files matching .env* have been committed in git history — secrets may be exposed"
    remediation: "Remove .env files from git history using git-filter-repo"
    fix_command: "git filter-repo --path .env --invert-paths"

  - id: git-large-recent-add
    severity: LOW
    category: data-exfiltration
    description: Large file added in recent commits
    detector: git_large_recent_add
    message: "Large file added in recent commits"
    remediation: "Remove large files from recent commits"
    fix_command: "git rm large_file && git commit --amend"

  - id: git-hook-suspicious
    severity: HIGH
    category: git-hooks
    description: Git hook contains network or shell execution
    detector: git_hook_suspicious
    message: "Git hook contains network or shell execution"
    remediation: "Review git hooks for network/shell execution"

  # ── Gitignore Abuse ──────────────────────────────────────────────
  - id: git-ignored-file-present
    severity: LOW
    category: ignored-artifact
    description: File present on disk but .gitignore'd — potential hiding place
    detector: git_ignored_file_present
    message: "File present on disk but .gitignore'd — potential hiding place for malware"
    remediation: "Remove the ignored file or un-ignore it if intentional"
    fix_command: "git add -f file"

  - id: dockerignore-mismatch
    severity: LOW
    category: docker-supply-chain
    description: Pattern in .dockerignore but not in .gitignore
    detector: dockerignore_mismatch
    message: "Pattern in .dockerignore but not in .gitignore"
    remediation: "Sync .dockerignore with .gitignore to prevent hidden file leaks"
    fix_command: "diff .gitignore .dockerignore"

